apiVersion: apps/v1
kind: Deployment
metadata:
  name: lingolearn
  namespace: lingolearn
  labels:
    app: lingolearn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lingolearn
  template:
    metadata:
      labels:
        app: lingolearn
    spec:
      containers:
        - name: lingolearn
          image: ghcr.io/willuhmjs/lingolearn:latest # {"$image": "lingolearn-image"}
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lingolearn-postgresql-app
                  key: uri
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: lingolearn-secrets
                  key: AUTH_SECRET
            - name: AUTH_GOOGLE_ID
              valueFrom:
                secretKeyRef:
                  name: lingolearn-secrets
                  key: AUTH_GOOGLE_ID
                  optional: true
            - name: AUTH_GOOGLE_SECRET
              valueFrom:
                secretKeyRef:
                  name: lingolearn-secrets
                  key: AUTH_GOOGLE_SECRET
                  optional: true
            - name: DEFAULT_LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: lingolearn-secrets
                  key: DEFAULT_LLM_BASE_URL
            - name: DEFAULT_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lingolearn-secrets
                  key: DEFAULT_LLM_API_KEY
            - name: DEFAULT_LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: lingolearn-secrets
                  key: DEFAULT_LLM_MODEL
            - name: BODY_SIZE_LIMIT
              value: '52428800'
          resources:
            requests:
              memory: '2Gi'
              cpu: '2000m'
            limits:
              memory: '32Gi'
              cpu: '16000m'
